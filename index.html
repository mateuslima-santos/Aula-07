<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de JavaScript 1</title>
</head>
<body>

    <h1> Tela pra rodar JS </h1>

    <!-- 
    
    1 – Soma de Números Informados pelo Usuário
    Desenvolva um algoritmo que permita ao usuário informar quantos números desejar.
    O programa deve continuar solicitando números até que o usuário decida parar.
    Ao final, o algoritmo deve mostrar:
    A soma total dos números informados.

    -->

    <p>
        <button class="button" onclick="somar_numeros()"> Ex 01 </button>
        <script src="scripts/ex01.js"></script>
    </p>

    <!-- 
    
    2 – Contagem Regressiva da NASA
    A NASA precisa de sua ajuda para realizar um lançamento de foguete.
    Crie um algoritmo que faça uma contagem regressiva para o lançamento,
    iniciando em 10 e indo até 0.
    Ao final da contagem, exiba a mensagem:
    "Lançamento realizado!"
    
    -->

    <p>
        <button class="button" onclick="contagem_regressiva()"> Ex 02 </button>
        <script src="scripts/ex02.js"></script>
    </p>

    <b id="contador"></b>

    <!-- 
    
    3 – Balanço Financeiro Anual de uma Empresa
    A empresa Mawer precisa realizar seu balanço financeiro anual.
    Crie um algoritmo que solicite para cada um dos 12 meses do ano:
        ● O ganho bruto do mês
        ● Os gastos do mês
    Ao final, o programa deverá mostrar:
        ● Ganho bruto anual
        ● Gasto anual
        ● Saldo financeiro anual
    O programa também deverá informar se a empresa teve:
        ● Lucro
        ● Prejuízo
    
    -->
    
    <p>
        <button class="button" onclick="balanco_financeiro()"> Ex 03 </button>
        <script src="scripts/ex03.js"></script>
    </p>

    <!-- 
    
    4 – Ordenação de Valores Inteiros
    Crie um algoritmo que solicite 4 valores inteiros ao usuário.
    Ao final, o programa deve mostrar os números em ordem decrescente.
    
    -->

    <p>
        <button class="button" onclick="ordenacao()"> Ex 04 </button>
        <script src="scripts/ex04.js"></script>
    </p>

    <!-- 
    
    5 – Transformação de Número Par e Ímpar
    Desenvolva um algoritmo que:
        ➔ Peça um número inteiro ao usuário.
        ➔ Verifique se o número é par ou ímpar.
    O programa deverá:
        ➔ Se for par, transformá-lo em ímpar.
        ➔ Se for ímpar, transformá-lo em par.
        ➔ Mostre o valor final no console.

    -->

    <p>
        <button class="button" onclick="par_impar()"> Ex 05 </button>
        <script src="scripts/ex05.js"></script>
    </p>

    <!-- 
    
    6 – Verificador de Vogal ou Consoante
        ➔ Crie um algoritmo que peça ao usuário uma letra do alfabeto.
    O programa deverá verificar se a letra digitada é:
        ➔ Vogal
        ➔ Consoante
    E mostrar o resultado no console.

    -->

    <p>
        <button class="button" onclick="alfabeto()"> Ex 06 </button>
        <script src="scripts/ex06.js"></script>
    </p>

    <!-- 
    
    7 – Sistema de Preços de uma Picoléteria
    Uma picoléteria precisa de um sistema simples para mostrar o preço de seus produtos.
    Crie um algoritmo que permita selecionar o sabor do picolé e mostre seu preço correspondente.
    Sabores disponíveis:

        CÓDIGO / SABOR / PREÇO

        a / Chocolate / R$ 1,50
        b / Morango / R$ 2,50
        c / Creme / R$ 2,50
        d / Manga / R$ 3,20
        e / Melancia / R$ 3,40
        f / Vanilla Ice / R$ 3,00
        g / Céu Azul / R$ 3,60
        h / Brownie / R$ 4,00
        i / Hawaiano / R$ 5,00

    O programa deve solicitar o código do sabor e mostrar o preço
    correspondente.

    -->

    <p>
        <button class="button" onclick="picole()"> Ex 07 </button>
        <script src="scripts/ex07.js"></script>
    </p>

    <!-- 
    
    8 – Operações com Duas Variáveis
    Crie um programa que declare duas variáveis inteiras e atribua valores a elas.
    O programa deverá mostrar:
        ➔ a) A diferença entre as duas variáveis.
        ➔ b) O dobro da primeira variável somado ao triplo da segunda.
        ➔ c) A multiplicação das duas variáveis.

    -->

    <p>
        <button class="button" onclick="operacao()"> Ex 08 </button>
        <script src="scripts/ex08.js"></script>
    </p>

    <!-- 
    
    9 – Ordenação entre Dois Números
    Crie um programa que declare duas variáveis inteiras.
    O programa deve mostrar no console:
    Os dois valores do maior para o menor.

    -->

    <p>
        <button class="button" onclick="ordenacao_dois()"> Ex 09 </button>
        <script src="scripts/ex09.js"></script>
    </p>

    <!-- 
    
    10 – Folha de Pagamento Simplificada
    Crie um programa que simule uma folha de pagamento simples.
    O programa deve solicitar:
        ➔ Nome do funcionário
        ➔ Salário bruto
        ➔ Considere que a taxa de desconto do INSS é de 8%.
    O programa deverá mostrar:
        ➔ Nome do funcionário
        ➔ Salário bruto
        ➔ Valor do desconto do INSS
        ➔ Salário líquido

    -->

    <p>
        <button class="button" onclick="desconto_simples()"> Ex 10 </button>
        <script src="scripts/ex10.js"></script>
    </p>

    <!-- 
    
   11 – Folha de Pagamento com Desconto Variável
    Baseando-se no exercício anterior, crie um programa que calcule o desconto
    do INSS de acordo com a faixa salarial.

    Tabela de descontos

    Faixa Salarial / Desconto

    Até R$ 1.000,00 / 8%
    De R$ 1.000,01 até R$ 1.500,00 / 8,5%
    Acima de R$ 1.500,00 / 9%

    O programa deverá mostrar:
        ➔ Salário informado
        ➔ Taxa de desconto aplicada
        ➔ Valor do desconto
        ➔ Salário líquido

    -->

    <p>
        <button class="button" onclick="desconto_variado()"> Ex 11 </button>
        <script src="scripts/ex11.js"></script>
    </p>
    
</body>
</html>
